# Configuration du projet local Supabase.
# Sprint 1 : dossier prêt pour les migrations — AUCUNE table (c'est le Sprint 2).
# WHY: ce fichier reproduit la sortie de `supabase init`. Au Sprint 2, le CLI Supabase
# (à ajouter en devDependency) le régénère/étend et porte les migrations versionnées.
project_id = "grandford"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

[realtime]
enabled = true

[storage]
enabled = true

# WHY verify_jwt = false : la fonction fait sa propre auth (bearer === SERVICE_ROLE,
# index.ts:52). Le JWT de passerelle est redondant ET bloquant — les appels pg_cron
# via net.http_post n'envoient pas un JWT signé Supabase mais la clé service brute,
# que verify_jwt ne reconnaît pas → 401 sans log. La sécurité reste intacte :
# toute requête sans la clé service exacte est rejetée par le code (ligne 52-54).
[functions.send-reminders]
verify_jwt = false
